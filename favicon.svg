<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="100%" stop-color="#E55A2B"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#shine)"/>
  <!-- Letter T - bold, modern, slightly stylized -->
  <path d="
    M 128 120
    L 384 120
    L 384 192
    L 292 192
    L 292 392
    L 220 392
    L 220 192
    L 128 192
    Z
  " fill="#FFFFFF"/>
  <!-- Small accent dot bottom-right of the T leg -->
  <circle cx="330" cy="370" r="24" fill="#FFFFFF" opacity="0.9"/>
</svg>
